<svg width="520" height="240" viewBox="0 0 520 240" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="GitHub coding stats: commits by time of day, peak day Tuesday, timezone Europe/Berlin">
  <title>Coding Stats</title>
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&amp;family=DM+Sans:wght@400;500&amp;display=swap');
      .mono { font-family: 'JetBrains Mono', monospace; }
      .sans { font-family: 'DM Sans', sans-serif; }
    </style>
    <clipPath id="card-clip">
      <rect width="520" height="240" rx="14"/>
    </clipPath>
    <clipPath id="left-panel-clip">
      <rect x="0" y="0" width="198" height="240"/>
    </clipPath>
  </defs>

  <g clip-path="url(#card-clip)">
    <rect width="520" height="240" rx="14" fill="#0d1117"/>
    <rect width="520" height="2" fill="#3B6D11"/>
    <line x1="200" y1="16" x2="200" y2="224" stroke="#21262d" stroke-width="1"/>

    <g clip-path="url(#left-panel-clip)">
      <circle cx="99" cy="122" r="58" fill="none" stroke="#161b22" stroke-width="20"/>
      <circle cx="99" cy="122" r="58" fill="none" stroke="#2d333b" stroke-width="20"
        stroke-dasharray="6 358" stroke-dashoffset="91" transform="rotate(-90 99 122)"/>
      <circle cx="99" cy="122" r="58" fill="none" stroke="#639922" stroke-width="20"
        stroke-dasharray="57 308" stroke-dashoffset="85" transform="rotate(-90 99 122)"/>
      <circle cx="99" cy="122" r="58" fill="none" stroke="#97C459" stroke-width="20"
        stroke-dasharray="100 264" stroke-dashoffset="28" transform="rotate(-90 99 122)"/>
      <circle cx="99" cy="122" r="58" fill="none" stroke="#3B6D11" stroke-width="20"
        stroke-dasharray="201 163" stroke-dashoffset="-72" transform="rotate(-90 99 122)"/>
      <circle cx="99" cy="122" r="44" fill="#0d1117"/>
      <text x="99" y="116" text-anchor="middle" class="mono" font-size="17" font-weight="600" fill="#e6edf3">55%</text>
      <text x="99" y="131" text-anchor="middle" class="sans" font-size="10" fill="#8b949e">daytime</text>
    </g>

    <text x="99" y="210" text-anchor="middle" class="sans" font-size="10" fill="#484f58">commits by time of day</text>

    <text x="220" y="40" class="mono" font-size="10" font-weight="500" fill="#484f58" letter-spacing="2">CODING STATS</text>
    <text x="220" y="74" class="mono" font-size="26" font-weight="600" fill="#e6edf3"><!--COMMIT_COUNT-->982</text>
    <text x="220" y="92" class="sans" font-size="12" fill="#8b949e">total commits</text>

    <line x1="220" y1="108" x2="504" y2="108" stroke="#21262d" stroke-width="1"/>

    <rect x="220" y="118" width="8" height="8" rx="2" fill="#3B6D11"/>
    <text x="235" y="127" class="sans" font-size="12" fill="#c9d1d9">Daytime</text>
    <text x="390" y="127" class="mono" font-size="11" font-weight="500" fill="#3B6D11">55.24%</text>
    <text x="458" y="127" class="mono" font-size="10" fill="#484f58">247K</text>

    <rect x="220" y="138" width="8" height="8" rx="2" fill="#97C459"/>
    <text x="235" y="147" class="sans" font-size="12" fill="#c9d1d9">Morning</text>
    <text x="390" y="147" class="mono" font-size="11" fill="#8b949e">27.47%</text>
    <text x="458" y="147" class="mono" font-size="10" fill="#484f58">123K</text>

    <rect x="220" y="158" width="8" height="8" rx="2" fill="#639922"/>
    <text x="235" y="167" class="sans" font-size="12" fill="#c9d1d9">Evening</text>
    <text x="390" y="167" class="mono" font-size="11" fill="#8b949e">15.61%</text>
    <text x="458" y="167" class="mono" font-size="10" fill="#484f58">70K</text>

    <rect x="220" y="178" width="8" height="8" rx="2" fill="#2d333b"/>
    <text x="235" y="187" class="sans" font-size="12" fill="#c9d1d9">Night</text>
    <text x="390" y="187" class="mono" font-size="11" fill="#8b949e">1.68%</text>
    <text x="458" y="187" class="mono" font-size="10" fill="#484f58">7.5K</text>

    <line x1="220" y1="200" x2="504" y2="200" stroke="#21262d" stroke-width="1"/>

    <rect x="220" y="210" width="96" height="16" rx="8" fill="#1a2d0e"/>
    <text x="268" y="221" text-anchor="middle" class="mono" font-size="9" fill="#97C459">peak: Tuesday</text>

    <rect x="324" y="210" width="110" height="16" rx="8" fill="#0c1929"/>
    <text x="379" y="221" text-anchor="middle" class="mono" font-size="9" fill="#85B7EB">Europe / Berlin</text>
  </g>
</svg>
