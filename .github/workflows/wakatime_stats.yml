name: Waka Readme

on:
  # for manual workflow trigger
  workflow_dispatch:
  schedule:
    # runs every day at 12 AM UTC (5:30 AM IST)
    - cron: "0 0 * * *"

permissions:
  contents: write

concurrency:
  group: waka-readme-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update-readme:
    name: Update Readme with Metrics
    env:
      WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - uses: anmol098/waka-readme-stats@master
        with:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          SHOW_COMMIT: "True"
          SHOW_DAYS_OF_WEEK: "True"
          SHOW_TIMEZONE: "True"
          SHOW_LANGUAGE: "False"
          SHOW_OS: "False"
          SHOW_EDITORS: "False"
          SHOW_PROJECTS: "False"
          SHOW_LINES_OF_CODE: "False"
          SHOW_PROFILE_VIEWS: "False"
          SHOW_TOTAL_CODE_TIME: "False"
          SHOW_LANGUAGE_PER_REPO: "False"
          SHOW_SHORT_INFO: "False"
          SHOW_LOC_CHART: "False"

      - name: Add total commits line
        run: |
          total_commits=$(awk '
            /<!--START_SECTION:waka-->/, /<!--END_SECTION:waka-->/ {
              if ($0 ~ /(Morning|Daytime|Evening|Night)/ && $0 ~ /commits/) {
                count = $3
                gsub(/,/, "", count)
                sum += count
              }
            }
            END { print sum + 0 }
          ' README.md)

          awk -v total="$total_commits" '
            BEGIN { inserted = 0 }
            {
              print
              if ($0 ~ /<!--START_SECTION:waka-->/) {
                if (getline nextline) {
                  if (nextline ~ /^\*\*Total Commits:\*\*/ || nextline ~ /^Total Commits:/) {
                    print "**Total Commits:** " total
                  } else {
                    print "**Total Commits:** " total
                    print nextline
                  }
                }
                inserted = 1
              }
            }
            END {
              if (!inserted) {
                print "<!--START_SECTION:waka-->"
                print "**Total Commits:** " total
                print "<!--END_SECTION:waka-->"
              }
            }
          ' README.md > README.tmp && mv README.tmp README.md

      - name: Sync with remote before commit
        run: |
          git fetch origin "${GITHUB_REF_NAME}"
          git pull --rebase --autostash origin "${GITHUB_REF_NAME}"

      - name: Commit total commits update
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: add total commits to waka section"
          file_pattern: README.md