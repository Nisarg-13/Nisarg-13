name: Waka Readme

on:
  # for manual workflow trigger
  workflow_dispatch:
  schedule:
    # runs every day at 12 AM UTC (5:30 AM IST)
    - cron: "0 0 * * *"

permissions:
  contents: write

concurrency:
  group: waka-readme-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update-readme:
    name: Update Readme with Metrics
    env:
      WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - uses: anmol098/waka-readme-stats@master
        with:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          SHOW_COMMIT: "True"
          SHOW_DAYS_OF_WEEK: "True"
          SHOW_TIMEZONE: "True"
          SHOW_LANGUAGE: "False"
          SHOW_OS: "False"
          SHOW_EDITORS: "False"
          SHOW_PROJECTS: "False"
          SHOW_LINES_OF_CODE: "False"
          SHOW_PROFILE_VIEWS: "False"
          SHOW_TOTAL_CODE_TIME: "False"
          SHOW_LANGUAGE_PER_REPO: "False"
          SHOW_SHORT_INFO: "False"
          SHOW_LOC_CHART: "False"

      - name: Remove unwanted Waka headings
        run: |
          awk "!/\*\*I'm an Early/ && !/\*\*This Week I Spent My Time On/" README.md > README.tmp && mv README.tmp README.md

      - name: Update total commits line
        run: |
          total_commits=$(awk '
            /<!--START_SECTION:waka-->/, /<!--END_SECTION:waka-->/ {
              if ($0 ~ /(Morning|Daytime|Evening|Night)/ && $0 ~ /commits/) {
                count = $3
                gsub(/,/, "", count)
                sum += count
              }
            }
            END { print sum + 0 }
          ' README.md)

          awk -v total="$total_commits" '
            BEGIN { in_block = 0; found_start = 0; found_end = 0 }
            {
              if ($0 ~ /<!--TOTAL_COMMITS_START-->/) {
                print
                print "**Total Commits:** " total
                in_block = 1
                found_start = 1
                next
              }

              if ($0 ~ /<!--TOTAL_COMMITS_END-->/) {
                in_block = 0
                found_end = 1
                print
                next
              }

              if (!in_block) print
            }
            END {
              if (!found_start || !found_end) {
                print "<!--TOTAL_COMMITS_START-->"
                print "**Total Commits:** " total
                print "<!--TOTAL_COMMITS_END-->"
              }
            }
          ' README.md > README.tmp && mv README.tmp README.md

      - name: Commit and push README updates
        run: |
          if git diff --quiet -- README.md; then
            echo "No README changes to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add README.md
          git commit -m "chore: update waka stats and total commits" || {
            echo "Nothing to commit"
            exit 0
          }

          for attempt in 1 2 3; do
            echo "Push attempt $attempt"
            git pull --rebase --autostash origin "${GITHUB_REF_NAME}" && \
              git push origin "HEAD:${GITHUB_REF_NAME}" && exit 0
          done

          echo "Failed to push after 3 attempts" >&2
          exit 1