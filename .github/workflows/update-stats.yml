name: Update README stats

on:
  schedule:
    - cron: '0 0 * * *'   # runs every day at 00:00 UTC (midnight)
  workflow_dispatch:        # allows manual trigger from GitHub Actions tab

jobs:
  update-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout profile repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch commit count & update files
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          GH_USERNAME: Nisarg-13
        run: |
          python3 << 'EOF'
          import requests
          import re
          import os
          import time
          from datetime import date

          username = os.environ["GH_USERNAME"]
          token    = os.environ["GH_TOKEN"]
          headers  = {
              "Authorization": f"Bearer {token}",
              "Accept": "application/vnd.github+json",
              "X-GitHub-Api-Version": "2022-11-28"
          }

          def gh_get(url, params=None):
              """GET with automatic rate-limit retry."""
              while True:
                  r = requests.get(url, headers=headers, params=params)
                  if r.status_code == 403 and "rate limit" in r.text.lower():
                      reset = int(r.headers.get("X-RateLimit-Reset", time.time() + 60))
                      wait  = max(reset - int(time.time()), 1) + 2
                      print(f"  Rate limited — waiting {wait}s")
                      time.sleep(wait)
                      continue
                  return r

          def get_all_pages(url, params=None):
              """Collect all items across paginated responses."""
              items = []
              params = {**(params or {}), "per_page": 100, "page": 1}
              while True:
                  r = gh_get(url, params)
                  if r.status_code != 200:
                      print(f"  Warning: {url} returned {r.status_code}")
                      break
                  batch = r.json()
                  if not isinstance(batch, list) or not batch:
                      break
                  items.extend(batch)
                  if len(batch) < 100:
                      break
                  params["page"] += 1
              return items

          # ── 1. Collect every repo the user owns or is a member of ──────────
          print("Fetching repos...")

          # Personal repos (public + private + org member repos)
          personal = get_all_pages(
              "https://api.github.com/user/repos",
              {"affiliation": "owner,collaborator,organization_member", "type": "all"}
          )
          repo_full_names = {r["full_name"] for r in personal}

          # Orgs the user belongs to — grab all their repos too
          orgs = get_all_pages("https://api.github.com/user/orgs")
          for org in orgs:
              org_repos = get_all_pages(
                  f"https://api.github.com/orgs/{org['login']}/repos",
                  {"type": "all"}
              )
              for r in org_repos:
                  repo_full_names.add(r["full_name"])

          print(f"Found {len(repo_full_names)} repos total")

          # ── 2. Count commits authored by user in every repo ────────────────
          print("Counting commits (this may take a minute)...")
          total = 0

          for repo in sorted(repo_full_names):
              count = 0
              page  = 1
              while True:
                  r = gh_get(
                      f"https://api.github.com/repos/{repo}/commits",
                      {"author": username, "per_page": 100, "page": page}
                  )
                  if r.status_code == 409:   # empty repo
                      break
                  if r.status_code == 404:   # no access
                      break
                  if r.status_code != 200:
                      print(f"  Skipping {repo}: HTTP {r.status_code}")
                      break
                  batch = r.json()
                  if not isinstance(batch, list) or not batch:
                      break
                  count += len(batch)
                  if len(batch) < 100:
                      break
                  page += 1

              if count:
                  print(f"  {repo}: {count}")
              total += count

          commit_str = f"{total:,}"
          print(f"\nTotal commits across all repos: {commit_str}")

          # ── 3. Calculate age (auto-updates every birthday) ─────────────────
          born  = date(2002, 9, 13)
          today = date.today()
          age   = today.year - born.year - ((today.month, today.day) < (born.month, born.day))
          print(f"Age: {age}")

          # ── 4. Update README.md ────────────────────────────────────────────
          with open("README.md", "r") as f:
              readme = f.read()

          readme = re.sub(
              r"<!--AGE_START-->\d+<!--AGE_END-->",
              f"<!--AGE_START-->{age}<!--AGE_END-->",
              readme
          )

          with open("README.md", "w") as f:
              f.write(readme)

          # ── 5. Update SVG commit count ─────────────────────────────────────
          with open("github-stats-card.svg", "r") as f:
              svg = f.read()

          svg = re.sub(
              r"<!--COMMIT_COUNT-->.*?(?=<)",
              f"<!--COMMIT_COUNT-->{commit_str}",
              svg
          )

          with open("github-stats-card.svg", "w") as f:
              f.write(svg)

          print("Files updated successfully.")
          EOF

      - name: Commit & push changes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md github-stats-card.svg
          git diff --cached --quiet || git commit -m "chore: auto-update stats [$(date -u '+%Y-%m-%d')]"
          git push
